# nginx reverse proxy for the NadaRuns Next.js app (runs on 127.0.0.1:3000)
#
# Place in /etc/nginx/sites-available/nadaruns and symlink to sites-enabled,
# then: sudo nginx -t && sudo systemctl reload nginx
# Add HTTPS with: sudo certbot --nginx

server {
    listen 80;
    server_name nadaruns.com www.nadaruns.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
