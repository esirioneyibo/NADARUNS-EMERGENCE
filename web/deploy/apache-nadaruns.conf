# Apache reverse proxy for the NadaRuns Next.js app (runs on 127.0.0.1:3000)
#
# Enable the required modules once:
#   sudo a2enmod proxy proxy_http headers
#   sudo systemctl restart apache2
#
# Then place this file as a vhost (e.g. /etc/apache2/sites-available/nadaruns.conf)
#   sudo a2ensite nadaruns && sudo systemctl reload apache2
# After it works on :80, run `sudo certbot --apache` to add HTTPS automatically.

<VirtualHost *:80>
    ServerName nadaruns.com
    ServerAlias www.nadaruns.com

    ProxyRequests Off
    ProxyPreserveHost On

    # Forward all traffic to the Node (Next.js) process
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Pass real client info to the app
    RequestHeader set X-Forwarded-Proto "http"

    ErrorLog  ${APACHE_LOG_DIR}/nadaruns_error.log
    CustomLog ${APACHE_LOG_DIR}/nadaruns_access.log combined
</VirtualHost>
